name: LinkedIn Job Bot

on:
  schedule:
    - cron: '0 12 * * *'   # 7:00 AM CDT
    - cron: '0 16 * * *'   # 11:00 AM CDT
    - cron: '0 20 * * *'   # 3:00 PM CDT
    - cron: '0 0 * * *'    # 7:00 PM CDT
  workflow_dispatch:
    inputs:
      linkedin_email:
        description: "LinkedIn email — leave blank to use LINKEDIN_EMAIL secret"
        required: false
        default: ""
        type: string
      linkedin_password:
        description: "LinkedIn password — leave blank to use LINKEDIN_PASSWORD secret"
        required: false
        default: ""
        type: string
      email_recipients:
        description: "Email recipients (comma-separated) — leave blank for default"
        required: false
        default: ""
        type: string
      technologies:
        description: "Job search keywords (comma-separated) — leave blank for default"
        required: false
        default: ""
        type: string

jobs:
  run-linkedin-bot:
    runs-on: ubuntu-latest
    environment: jobAlert

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Mask passwords in logs
        run: |
          echo "::add-mask::${{ secrets.LINKEDIN_PASSWORD }}"
          echo "::add-mask::${{ inputs.linkedin_password }}"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          cat > .env << 'ENVEOF'
          LINKEDIN_EMAIL=${{ inputs.linkedin_email || secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD=${{ inputs.linkedin_password || secrets.LINKEDIN_PASSWORD }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          ADZUNA_APP_ID=${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY=${{ secrets.ADZUNA_APP_KEY }}
          EMAIL_SENDER=${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD=${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS=${{ inputs.email_recipients || 'revathibathina11@gmail.com,dama.vasanth@gmail.com' }}
          JOB_SEARCH_KEYWORDS=${{ inputs.technologies || 'QA Engineer,SDET,QA Automation,Automation QA' }}
          ADZUNA_KEYWORDS=${{ inputs.technologies }}
          PRIMARY_LOCATION=Texas, United States
          INCLUDE_REMOTE=true
          JOB_TYPE=C
          MAX_JOBS_TO_APPLY=10
          LISTED_AT_DAYS=1
          MIN_HOURLY_RATE=50
          EXPECTED_HOURLY_RATE=50
          BASE_RESUME_PATH=resume/base_resume.docx
          TRACKER_FILE=applied_jobs.csv
          YEARS_OF_EXPERIENCE=11
          WORK_AUTHORIZATION=Yes
          WILLING_TO_RELOCATE=YES
          ENVEOF

      - name: Restore resume
        run: |
          mkdir -p resume
          if [ -n "${{ secrets.RESUME_BASE64 }}" ]; then
            echo '${{ secrets.RESUME_BASE64 }}' | base64 -d > resume/base_resume.docx
            echo "[Resume] Restored from RESUME_BASE64 secret"
          else
            echo "[Resume] RESUME_BASE64 not set — resume tailoring will be skipped"
          fi

      - name: Run Job Bot
        run: python main.py

      - name: Upload job tracker CSV as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: applied-jobs-${{ github.run_number }}
          path: applied_jobs.csv
          if-no-files-found: ignore
          retention-days: 7
