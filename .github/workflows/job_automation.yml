name: QA Job Automation

on:
  schedule:
    # CDT (UTC-5): Mar–Nov  →  switch to CST (UTC-6) in November: change 12→13, 16→17, 20→21, 0→1
    - cron: '0 12 * * *'   # 7:00 AM CDT  (UTC-5)
    - cron: '0 16 * * *'   # 11:00 AM CDT
    - cron: '0 20 * * *'   # 3:00 PM CDT
    - cron: '0 0 * * *'    # 7:00 PM CDT
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:
  # ── Job 1: Adzuna + RemoteOK on GitHub cloud ──────────────
  collect:
    runs-on: ubuntu-latest
    environment: jobAlert
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          cat > .env << 'ENVEOF'
          LINKEDIN_EMAIL=${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD=${{ secrets.LINKEDIN_PASSWORD }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          JOB_SEARCH_KEYWORDS=QA,SDET
          PRIMARY_LOCATION=Texas, United States
          INCLUDE_REMOTE=true
          JOB_TYPE=C
          MAX_JOBS_TO_APPLY=10
          LISTED_AT_DAYS=1
          MIN_HOURLY_RATE=50
          EXPECTED_HOURLY_RATE=50
          BASE_RESUME_PATH=resume.docx
          TRACKER_FILE=applied_jobs.csv
          YEARS_OF_EXPERIENCE=11
          WORK_AUTHORIZATION=Yes
          WILLING_TO_RELOCATE=YES
          ADZUNA_APP_ID=${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY=${{ secrets.ADZUNA_APP_KEY }}
          EMAIL_SENDER=${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD=${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS=revathibathina11@gmail.com,dama.vasanth@gmail.com
          ENVEOF

      - name: Restore resume
        run: echo '${{ secrets.RESUME_BASE64 }}' | base64 -d > resume.docx

      - name: Run collection portals (Adzuna + RemoteOK)
        run: python main.py --collect-only

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collect-results
          path: applied_jobs.csv
          retention-days: 7

  # ── Job 2: LinkedIn on your local Windows machine ─────────
  # Runs on self-hosted runner — uses your real home IP (no LinkedIn block)
  linkedin:
    runs-on: self-hosted
    environment: jobAlert
    needs: collect
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        shell: powershell
        run: pip install -r requirements.txt; python -m playwright install chromium

      - name: Create .env
        shell: powershell
        env:
          LINKEDIN_EMAIL:       ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD:    ${{ secrets.LINKEDIN_PASSWORD }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          ADZUNA_APP_ID:        ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:       ${{ secrets.ADZUNA_APP_KEY }}
          EMAIL_SENDER:         ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD:   ${{ secrets.EMAIL_APP_PASSWORD }}
        run: |
          @"
          LINKEDIN_EMAIL=$env:LINKEDIN_EMAIL
          LINKEDIN_PASSWORD=$env:LINKEDIN_PASSWORD
          ANTHROPIC_API_KEY=$env:ANTHROPIC_API_KEY
          JOB_SEARCH_KEYWORDS=QA,SDET
          PRIMARY_LOCATION=Texas, United States
          INCLUDE_REMOTE=true
          JOB_TYPE=C
          MAX_JOBS_TO_APPLY=10
          LISTED_AT_DAYS=1
          MIN_HOURLY_RATE=50
          EXPECTED_HOURLY_RATE=50
          BASE_RESUME_PATH=resume.docx
          TRACKER_FILE=applied_jobs.csv
          YEARS_OF_EXPERIENCE=11
          WORK_AUTHORIZATION=Yes
          WILLING_TO_RELOCATE=YES
          ADZUNA_APP_ID=$env:ADZUNA_APP_ID
          ADZUNA_APP_KEY=$env:ADZUNA_APP_KEY
          EMAIL_SENDER=$env:EMAIL_SENDER
          EMAIL_APP_PASSWORD=$env:EMAIL_APP_PASSWORD
          EMAIL_RECIPIENTS=revathibathina11@gmail.com,dama.vasanth@gmail.com
          "@ | Out-File -FilePath .env -Encoding utf8

      - name: Restore resume
        shell: powershell
        env:
          RESUME_BASE64: ${{ secrets.RESUME_BASE64 }}
        run: |
          $bytes = [Convert]::FromBase64String($env:RESUME_BASE64)
          [IO.File]::WriteAllBytes("$PWD\resume.docx", $bytes)

      - name: Run LinkedIn Easy Apply
        shell: powershell
        run: python main.py --linkedin-only

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linkedin-results
          path: applied_jobs.csv
          retention-days: 7
